# Site settings
title: woadfox
description: >-
  terminal, ink, paper
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://woadfox.github.io"

# Build settings
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Header navigation (order matters)
header_pages:
  - index.markdown
  - about.markdown
  - ref_sheet.markdown
  - projects.markdown
  - poems.markdown
  - links.markdown

# Content collections
collections:
  projects:
    output: true
    permalink: /projects/:name/
  poems:
    output: true
    permalink: /poems/:name/

defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: project
  - scope:
      path: ""
      type: poems
    values:
      layout: poem
  - scope:
      path: ""
      type: posts
    values:
      layout: post

# Keep reference images out of the built site
exclude:
  - "Screenshot 2026-07-19 at 02.23.12.png"
  - "IMG_3910-scaled.webp"

# Theme options (vendored jekyll-theme-console)
# style: dark # handled by the in-page switcher from stage 3 onward
