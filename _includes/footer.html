<footer>
  <ul class="footer-menu">
    {%- for path in site.footer_pages -%}
      {%- assign my_page = site.pages | where: "path", path | first -%}
      {%- if my_page.title -%}
      <li>
        <a href="{{ my_page.url | relative_url }}"{% if page.url == my_page.url %} aria-current="page"{% endif %}>{{ my_page.title | escape }}</a>
      </li>
      {%- endif -%}
    {%- endfor -%}
  </ul>
  {{ site.footer }}
</footer>
